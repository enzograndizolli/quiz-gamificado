<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Focus</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(270deg, #0f172a, #1e3a8a, #020617);
  background-size:600% 600%;
  animation:fundo 10s ease infinite;
}

@keyframes fundo{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

#glow{
  position:fixed;
  width:150px;
  height:150px;
  background: radial-gradient(circle, rgba(59,130,246,0.2), transparent 70%);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
}

.phone{
  width:360px;
  margin:auto;
  margin-top:30px;
  background:#111;
  border-radius:25px;
  padding:15px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

.container{
  background:white;
  border-radius:20px;
  padding:15px;
}

.logo{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#1e3a8a;
}

.pergunta-box{
  transition:0.4s;
}

.animar{
  animation:entrar 0.4s;
}

@keyframes entrar{
  from{opacity:0;transform:translateX(40px)}
  to{opacity:1;transform:translateX(0)}
}

.opcao{
  background:#eef2ff;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  cursor:pointer;
}

.opcao:hover{
  transform:scale(1.02);
}

.selecionado{
  background:#1e3a8a;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1e3a8a;
  color:white;
  margin-top:10px;
  cursor:pointer;
}

.progress{
  height:6px;
  background:#ddd;
  border-radius:10px;
  margin:10px 0;
}

.bar{
  height:100%;
  width:0;
  background:#1e3a8a;
  border-radius:10px;
}

</style>
</head>

<body>

<div id="glow"></div>

<div class="phone">
<div class="container">

<div class="logo">🚀 Focus</div>

<div id="inicio">
  <p>Transforme sua rotina em progresso real ⚡</p>
  <button onclick="iniciar()">Começar</button>
</div>

<div id="quiz" style="display:none">
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div id="porcentagem">0%</div>

  <div id="perguntaBox" class="pergunta-box"></div>
</div>

<div id="final" style="display:none">
  <canvas id="grafico"></canvas>
</div>

</div>
</div>

<script>

let perguntas=[
{q:"O quão competitivo você se considera?",o:["Muito","Médio","Nada"]},
{q:"Você se distrai facilmente?",o:["Muito","Às vezes","Não"]},
{q:"Você gosta de desafios?",o:["Sim","Depende","Não"]},
{q:"Você costuma cumprir tarefas?",o:["Sempre","Às vezes","Nunca"]},
{q:"Você gosta de evoluir como em jogos?",o:["Sim","Talvez","Não"]},
{q:"Você acompanha seu progresso?",o:["Sim","Mais ou menos","Não"]},
{q:"Você gosta de rotina?",o:["Sim","Depende","Não"]},
{q:"Você usa apps de organização?",o:["Sim","Às vezes","Não"]},
{q:"Você prefere competir ou evoluir?",o:["Competir","Ambos","Evoluir"]},
{q:"Você se considera disciplinado?",o:["Sim","Mais ou menos","Não"]}
];

let atual=0;
let respostas=[];

function iniciar(){
 document.getElementById("inicio").style.display="none";
 document.getElementById("quiz").style.display="block";
 carregar();
}

function carregar(){
 let box=document.getElementById("perguntaBox");

 box.classList.remove("animar");
 void box.offsetWidth;
 box.classList.add("animar");

 let p=perguntas[atual];

 box.innerHTML=`<h3>${p.q}</h3>`;

 p.o.forEach((op,i)=>{
   let div=document.createElement("div");
   div.className="opcao";
   div.innerText=op;

   div.onclick=()=>{
     document.querySelectorAll(".opcao").forEach(e=>e.classList.remove("selecionado"));
     div.classList.add("selecionado");
     respostas[atual]=i;

     setTimeout(()=>{
       atual++;
       if(atual<perguntas.length){
         carregar();
         atualizarBarra();
       }else{
         finalizar();
       }
     },300);
   }

   box.appendChild(div);
 });

 atualizarBarra();
}

function atualizarBarra(){
 let p=(atual/perguntas.length)*100;
 document.getElementById("bar").style.width=p+"%";
 document.getElementById("porcentagem").innerText=Math.round(p)+"%";
}

function finalizar(){
 document.getElementById("quiz").style.display="none";
 document.getElementById("final").style.display="block";

 let cont=[0,0,0];
 respostas.forEach(r=>cont[r]++);

 new Chart(document.getElementById("grafico"),{
   type:"bar",
   data:{
     labels:["Alto","Médio","Baixo"],
     datasets:[{
       data:cont,
       backgroundColor:["#1e3a8a","#3b82f6","#22c55e"]
     }]
   }
 });

 let perfil="";
 if(cont[0]>cont[1] && cont[0]>cont[2]){
   perfil="🎯 Você tem perfil focado e competitivo.";
 }else if(cont[1]>cont[2]){
   perfil="⚖️ Você é equilibrado.";
 }else{
   perfil="🌱 Você está evoluindo seus hábitos.";
 }

 let div=document.createElement("div");
 div.innerText=perfil;
 div.style.marginTop="10px";
 document.getElementById("final").appendChild(div);
}

document.addEventListener("mousemove",(e)=>{
 let glow=document.getElementById("glow");
 glow.style.left=e.clientX+"px";
 glow.style.top=e.clientY+"px";
});

</script>

</body>
</html>
